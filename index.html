// ==================== FUNÇÕES IA ====================
async function chamarGemini(prompt) {
    if (!GEMINI_API_KEY) return "⚠️ IA não configurada.";
    try {
        const GEMINI_MODEL = 'gemini-1.5-flash';
        console.log("Enviando prompt:", prompt);
        
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                contents: [{ 
                    parts: [{ text: prompt }] 
                }] 
            })
        });
        
        if (!response.ok) {
            const erro = await response.text();
            console.error("Erro da API:", erro);
            return `Erro: ${erro}`;
        }
        
        const data = await response.json();
        console.log("Resposta:", data);
        
        const textoResposta = data.candidates?.[0]?.content?.parts?.[0]?.text;
        if (!textoResposta) {
            return "Desculpa, não consegui gerar uma resposta. Tenta reformular a pergunta.";
        }
        return textoResposta;
    } catch (error) {
        console.error("Erro de conexão:", error);
        return "Erro de conexão com a IA. Verifica a tua internet.";
    }
}

async function loadMerchantData() {
    if (!currentUser || currentUser.isAdmin) return null;
    const { data: merchant } = await supabaseClient.from('merchants').select('id, nome, negocio').eq('email', currentUser.email).single();
    if (!merchant) return null;
    currentMerchantId = merchant.id;
    currentEmpresa = merchant.negocio || merchant.nome;
    const [customers, invoices, products] = await Promise.all([
        supabaseClient.from('customers').select('*').eq('merchant_id', merchant.id),
        supabaseClient.from('invoices').select('*').eq('merchant_id', merchant.id),
        supabaseClient.from('products').select('*').eq('merchant_id', merchant.id)
    ]);
    return { customers: customers.data || [], invoices: invoices.data || [], products: products.data || [] };
}

function updateClock() {
    const now = new Date();
    const dias = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];
    const diaSemana = dias[now.getDay()];
    const data = now.toLocaleDateString('pt-PT');
    const hora = now.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('clock').innerHTML = `${diaSemana}, ${data} - ${hora}`;
}

    localStorage.removeItem('currentUser');
    document.getElementById('headerActions').style.display = 'none';
    showLogin();
}

// ==================== SAUDAÇÃO ====================
function showWelcome() {
    const nomeSalvo = localStorage.getItem(`kiesse_nome_${currentUser?.email}`);
    const nomeExibido = currentUser.isAdmin ? 'Administrador' : (nomeSalvo || currentEmpresa || currentUser?.name);
    const saudacao = getSaudacaoHorario();
    const frase = getFraseMotivacional();
    return `
        <div class="welcome-card">
            <h2>${saudacao}, ${nomeExibido}! 👋</h2>
            <p><i class="fas fa-quote-left"></i> ${frase}</p>
        </div>
    `;
}

// ==================== MENU ====================
async function renderMenu() {
    if (!currentUser) return;
    let html = '';
    if (currentUser.isAdmin) {
        const pendingCount = await getPendingCount();
        const blockedCount = await getBlockedCount();
        html += `<button data-page="admin"><i class="fas fa-user-check"></i> Aprovar Comerciantes${pendingCount > 0 ? `<span class="badge">${pendingCount}</span>` : ''}</button>`;
        html += `<button data-page="bloqueados"><i class="fas fa-ban"></i> Bloqueados${blockedCount > 0 ? `<span class="badge">${blockedCount}</span>` : ''}</button>`;
        html += `<button data-page="dashboard"><i class="fas fa-chart-line"></i> Dashboard Admin</button>`;
        html += `<button data-page="relatorios"><i class="fas fa-file-alt"></i> Relatórios</button>`;
        html += `<button data-page="ia"><i class="fas fa-robot"></i> Assistente IA Kiesse</button>`;
        html += `<button data-page="planos"><i class="fas fa-crown"></i> Planos</button>`;
        html += `<button data-page="config"><i class="fas fa-cog"></i> Configurações</button>`;
    } else {
        const assinatura = await getAssinatura();
        currentPlano = assinatura?.plano || 'basico';
        const planoClass = currentPlano === 'basico' ? 'basico' : (currentPlano === 'premium' ? 'premium' : 'max');
        document.getElementById('planoBadge').className = `plan-badge ${planoClass}`;
        document.getElementById('planoBadge').innerHTML = `<i class="fas fa-crown"></i> ${currentPlano.toUpperCase()}`;
        
        html += `<button data-page="dashboard"><i class="fas fa-chart-line"></i> Dashboard</button>`;
        html += `<button data-page="faturas"><i class="fas fa-file-invoice-dollar"></i> Faturas</button>`;
        html += `<button data-page="clientes"><i class="fas fa-users"></i> Clientes</button>`;
        html += `<button data-page="produtos"><i class="fas fa-boxes"></i> Produtos</button>`;
        html += `<button data-page="contabilidade"><i class="fas fa-chart-pie"></i> Contabilidade</button>`;
        html += `<button data-page="relatorios"><i class="fas fa-file-alt"></i> Relatórios</button>`;
        html += `<button data-page="ia"><i class="fas fa-robot"></i> Assistente IA Kiesse</button>`;
        html += `<button data-page="planos"><i class="fas fa-crown"></i> Planos</button>`;
        html += `<button data-page="config"><i class="fas fa-cog"></i> Configurações</button>`;
    }
    html += `<button data-page="logout"><i class="fas fa-sign-out-alt"></i> Sair</button>`;
    document.getElementById('nav').innerHTML = html;
    document.querySelectorAll('.sidebar-nav button').forEach(btn => {
        btn.addEventListener('click', () => showPage(btn.dataset.page));
    });
}

async function showPage(page) {
    if (!currentUser) { showLogin(); return; }
    closeMenu();
    if (page === 'dashboard') showDashboard();
    else if (page === 'faturas') showFaturas();
    else if (page === 'clientes') showClientes();
    else if (page === 'produtos') showProdutos();
    else if (page === 'contabilidade') showContabilidade();
    else if (page === 'relatorios') showRelatorios();
    else if (page === 'admin') showAdminPanel();
    else if (page === 'bloqueados') showBloqueadosPanel();
    else if (page === 'planos') mostrarPlanos();
    else if (page === 'ia') showIAAssistente();
    else if (page === 'config') showConfig();
    else if (page === 'logout') logout();
    document.querySelectorAll('.sidebar-nav button').forEach(btn => {
        if (btn.dataset.page === page) btn.classList.add('active');
        else btn.classList.remove('active');
    });
}

            <div class="card">

            </div>
            <div class="card">
                <h3>📄 Análise de Documento</h3>
                <div class="form-group"><textarea id="iaDocumentoTexto" rows="3" placeholder="Cole o texto do alvará, certidão ou contrato..."></textarea></div>

                <h3>📈 Relatório IA</h3>
                <p>Dados disponíveis: ${data?.invoices?.length || 0} faturas, ${data?.products?.length || 0} produtos</p>
                <button class="btn-primary" id="btnGerarRelatorioIA">Gerar Relatório</button>

        document.getElementById('iaResposta').innerHTML = await sugerirPrecoComIA(produto);
    });

        document.getElementById('iaAnaliseResposta').innerHTML = '<i class="fas fa-spinner fa-spin"></i> A IA Kiesse está a analisar...';
        document.getElementById('iaAnaliseResposta').innerHTML = await analisarVendasComIA({ totalVendas, numFaturas: data?.invoices?.length || 0 });

        document.getElementById('iaAdminResposta').innerHTML = '<i class="fas fa-spinner fa-spin"></i> IA a analisar...';

window.approveUser = async (email) => {
    const { data: pendingUser } = await supabaseClient.from('pending').select('*').eq('email', email).single();
    if (pendingUser) {
        await supabaseClient.from('merchants').insert([{ ...pendingUser, aprovado: true }]);
        await supabaseClient.from('pending').delete().eq('email', email);
        showAdminPanel();
        showMessage('✅ Comerciante aprovado!', 'success', 'adminMsg');
    }
};

window.rejectUser = async (email) => {
    await supabaseClient.from('pending').delete().eq('email', email);
    showAdminPanel();
    showMessage('❌ Comerciante rejeitado.', 'warning', 'adminMsg');
};

        <div class="table-wrapper">
            <table>
                <thead><tr><th>Nome</th><th>Email</th><th>Motivo</th><th>Data</th><th>Ações</th></tr></thead>
                <tbody>
    `;
    if (blocked && blocked.length > 0) {
        for (const b of blocked) {
            html += `<tr>
                <td>${b.merchants?.nome || '-'}</td>
                <td>${b.merchants?.email || '-'}</td>
                <td>${b.motivo}</td>
                <td>${new Date(b.data_bloqueio).toLocaleDateString()}</td>
                <td><button class="btn-primary" onclick="window.unblockMerchant('${b.id}')">Desbloquear</button></td>
            </tr>`;
        }
    } else {
        html += `<tr><td colspan="5">Nenhum bloqueado</td></tr>`;
    }
    html += `</tbody></table></div>`;
    document.getElementById('content').innerHTML = html;
}

window.unblockMerchant = async (id) => {
    await supabaseClient.from('blocked_merchants').update({ ativo: false, data_desbloqueio: new Date().toISOString() }).eq('id', id);
    showBloqueadosPanel();
};

window.assinarPlano = async (plano) => {
    await supabaseClient.from('assinaturas').update({ ativo: false }).eq('merchant_id', currentMerchantId).eq('ativo', true);
    await supabaseClient.from('assinaturas').insert([{ merchant_id: currentMerchantId, plano, data_inicio: new Date().toISOString().split('T')[0], data_fim: new Date(Date.now() + 30*24*60*60*1000).toISOString().split('T')[0], ativo: true }]);
    currentPlano = plano;
    showMessage(`✅ Plano ${plano.toUpperCase()} assinado!`, 'success');
    showDashboard();
};

// ==================== CONFIGURAÇÕES ====================
function showConfig() {
    document.getElementById('content').innerHTML = `
        ${showWelcome()}
        <h2><i class="fas fa-cog"></i> Configurações</h2>
        <div style="max-width: 400px;"><h3>Alterar Senha</h3><div id="configMsg"></div>
        <div class="form-group"><label>Senha Atual</label><input type="password" id="oldPass"></div>
        <div class="form-group"><label>Nova Senha</label><input type="password" id="newPass"></div>
        <div class="form-group"><label>Confirmar</label><input type="password" id="confirmPass"></div>
        <button class="btn-primary" id="changePassBtn">Alterar Senha</button></div>
        <hr style="margin:20px 0">
        <div style="max-width: 400px;"><h3>Saudação Diária</h3>
        <label><input type="checkbox" id="desativarSaudacao" ${saudacaoDesativada ? 'checked' : ''}> Desativar saudação da IA Kiesse</label>
        <button class="btn-secondary" id="salvarSaudacaoBtn">Salvar</button></div>
    `;
    document.getElementById('changePassBtn')?.addEventListener('click', async () => {
        const oldPass = document.getElementById('oldPass').value, newPass = document.getElementById('newPass').value, confirm = document.getElementById('confirmPass').value;
        if (!oldPass || !newPass) return showMessage('Preencha todos os campos', 'error', 'configMsg');
        if (newPass !== confirm) return showMessage('As senhas não coincidem', 'error', 'configMsg');
        if (currentUser.isAdmin) {
            if (oldPass === ADMIN_PASS) { showMessage('✅ Senha alterada!', 'success', 'configMsg'); setTimeout(() => logout(), 2000); }
            else showMessage('Senha atual incorreta', 'error', 'configMsg');
        } else {
            const { data: merchant } = await supabaseClient.from('merchants').select('senha').eq('email', currentUser.email).single();
            if (merchant && merchant.senha === oldPass) {
                await supabaseClient.from('merchants').update({ senha: newPass }).eq('email', currentUser.email);
                showMessage('✅ Senha alterada! Faça login novamente.', 'success', 'configMsg');
                setTimeout(() => logout(), 2000);
            } else showMessage('Senha atual incorreta', 'error', 'configMsg');
        }
    });
    document.getElementById('salvarSaudacaoBtn')?.addEventListener('click', () => {
        saudacaoDesativada = document.getElementById('desativarSaudacao').checked;
        localStorage.setItem(`saudacao_desativada_${currentUser.email}`, saudacaoDesativada);
        showMessage('✅ Preferência salva!', 'success', 'configMsg');
    });
}

// ==================== LOGIN ====================
function showLogin() {
    document.getElementById('headerActions').style.display = 'none';
    document.getElementById('content').innerHTML = `
        <div style="max-width: 400px; margin: 50px auto;">
            <h2><i class="fas fa-lock"></i> Entrar no V-Gest</h2>
            <div id="loginMsg"></div>
            <div class="form-group"><label>Email ou Telefone</label><input type="text" id="loginUser" placeholder="email@exemplo.com ou 923456789"></div>
            <div class="form-group"><label>Senha</label><input type="password" id="loginPass"></div>
            <button class="btn-primary" id="doLogin" style="width:100%">Entrar</button>
            <p style="margin-top: 16px; text-align:center;"><a href="#" id="showReg">📝 Criar conta grátis</a></p>
        </div>
        <div id="regForm" style="display:none; max-width:400px; margin:20px auto;">
            <h2>📝 Criar Conta</h2>
            <div id="regMsg"></div>
            <div class="form-group"><label>Nome completo</label><input type="text" id="regNome"></div>
            <div class="form-group"><label>Email</label><input type="email" id="regEmail"></div>
            <div class="form-group"><label>Telefone</label><input type="tel" id="regTel"></div>
            <div class="form-group"><label>Nome da empresa</label><input type="text" id="regEmpresa"></div>
            <div class="form-group"><label>Senha</label><input type="password" id="regPass"></div>
            <div class="form-group"><label>Confirmar Senha</label><input type="password" id="regPassConfirm"></div>
            <button class="btn-primary" id="doReg" style="width:100%">Registrar</button>
            <p><a href="#" id="backLogin">← Voltar</a></p>
        </div>
    `;

    document.getElementById('doLogin')?.addEventListener('click', async () => {
        const userInput = document.getElementById('loginUser').value, pass = document.getElementById('loginPass').value;
        if (userInput === ADMIN_EMAIL && pass === ADMIN_PASS) {
            currentUser = { email: ADMIN_EMAIL, isAdmin: true, name: 'Administrador' };
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            document.getElementById('headerActions').style.display = 'flex';
            document.body.classList.add('admin-theme');
            await renderMenu();
            showDashboard();
            return;
        }
        let { data: merchant } = await supabaseClient.from('merchants').select('*').eq('email', userInput).eq('senha', pass).single();
        if (!merchant) {
            const { data: merchantByPhone } = await supabaseClient.from('merchants').select('*').eq('telefone', userInput).eq('senha', pass).single();
            merchant = merchantByPhone;
        }
        if (merchant && merchant.aprovado) {
            currentUser = { email: merchant.email, name: merchant.nome, isAdmin: false, empresa: merchant.negocio };
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            document.getElementById('headerActions').style.display = 'flex';
            await renderMenu();
            // Carregar plano do usuário
            const assinatura = await getAssinatura();
            currentPlano = assinatura?.plano || 'basico';
            saudacaoDesativada = localStorage.getItem(`saudacao_desativada_${currentUser.email}`) === 'true';
            mostrarIAKiesse();
            showDashboard();
            return;
        }
        const { data: pendingUser } = await supabaseClient.from('pending').select('*').eq('email', userInput).single();
        if (pendingUser) document.getElementById('loginMsg').innerHTML = '<div class="alert alert-warning">⏳ Aguardando aprovação.</div>';
        else document.getElementById('loginMsg').innerHTML = '<div class="alert alert-error">❌ Credenciais inválidas</div>';
    });

    document.getElementById('showReg')?.addEventListener('click', (e) => { e.preventDefault(); document.getElementById('loginMsg').parentElement.style.display = 'none'; document.getElementById('regForm').style.display = 'block'; });
    document.getElementById('backLogin')?.addEventListener('click', (e) => { e.preventDefault(); document.getElementById('loginMsg').parentElement.style.display = 'block'; document.getElementById('regForm').style.display = 'none'; });
    document.getElementById('doReg')?.addEventListener('click', async () => {
        const nome = document.getElementById('regNome').value, email = document.getElementById('regEmail').value, tel = document.getElementById('regTel').value, empresa = document.getElementById('regEmpresa').value, senha = document.getElementById('regPass').value, confirm = document.getElementById('regPassConfirm').value;
        if (!nome || !email || !senha) return showMessage('Preencha todos os campos', 'error', 'regMsg');
        if (senha !== confirm) return showMessage('As senhas não coincidem', 'error', 'regMsg');
        const { error } = await supabaseClient.from('pending').insert([{ nome, email, telefone: tel, negocio: empresa, senha }]);
        if (error) return showMessage('Erro ao registrar', 'error', 'regMsg');
        showMessage('✅ Cadastro realizado! Aguarde aprovação.', 'success', 'regMsg');
        setTimeout(() => { document.getElementById('loginMsg').parentElement.style.display = 'block'; document.getElementById('regForm').style.display = 'none'; }, 2000);
    });
}

document.getElementById('darkBtn').addEventListener('click', () => { document.body.classList.toggle('dark'); localStorage.setItem('dark', document.body.classList.contains('dark') ? 'dark' : ''); });

if (localStorage.getItem('dark') === 'dark') document.body.classList.add('dark');
const saved = localStorage.getItem('currentUser');
if (saved) { 
    currentUser = JSON.parse(saved);
    document.getElementById('headerActions').style.display = 'flex';
    renderMenu().then(async () => {
        if (!currentUser.isAdmin) {
            const assinatura = await getAssinatura();
            currentPlano = assinatura?.plano || 'basico';
            saudacaoDesativada = localStorage.getItem(`saudacao_desativada_${currentUser.email}`) === 'true';
        }
        showDashboard();
    });
} else showLogin();
</script>
