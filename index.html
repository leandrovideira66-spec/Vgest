<style>
    :root {
        --primary-green: #0B4F2F;
        --gold: #C6A03E;
        --light-gold: rgba(198, 160, 62, 0.1);
        --bg-light: #f4f7f6;
        --text-dark: #333;
        --white: #ffffff;
        --transition: all 0.3s ease;
    }

    .dark-mode {
        --bg-light: #1a1a1a;
        --text-dark: #e0e0e0;
        --white: #2d2d2d;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

    body {
        background-color: var(--bg-light);
        color: var(--text-dark);
        /* Textura de Videira Suave no Fundo */
        background-image: url('https://www.transparenttextures.com/patterns/leaves.png'); /* Simulação de textura */
        background-attachment: fixed;
        transition: var(--transition);
    }

    /* Overlay de cor para a textura */
    body::before {
        content: "";
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: var(--light-gold);
        opacity: 0.08;
        z-index: -1;
        pointer-events: none;
    }

    /* Layout Principal */
    .wrapper { display: flex; min-height: 100vh; }

    /* Sidebar */
    aside {
        width: 260px;
        background: var(--primary-green);
        color: white;
        padding: 20px;
        display: flex;
        flex-direction: column;
        position: sticky;
        top: 0;
        height: 100vh;
    }

    .logo-area {
        text-align: center;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--gold);
        margin-bottom: 20px;
    }

    .logo-shield {
        font-size: 2rem;
        color: var(--gold);
    }

    nav ul { list-style: none; }
    nav ul li {
        padding: 12px 15px;
        margin: 5px 0;
        border-radius: 5px;
        cursor: pointer;
        transition: var(--transition);
        display: flex;
        align-items: center;
        gap: 10px;
    }

    nav ul li:hover, nav ul li.active {
        background: var(--gold);
        color: var(--primary-green);
    }

    /* Main Content */
    main { flex: 1; padding: 25px; position: relative; }

    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
        background: var(--white);
        padding: 15px 25px;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .btn-help {
        background: var(--gold);
        color: var(--primary-green);
        border: none;
        padding: 8px 15px;
        border-radius: 20px;
        font-weight: bold;
        cursor: pointer;
    }

    /* Cards do Dashboard */
    .dashboard-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
    }

    .card {
        background: var(--white);
        padding: 20px;
        border-radius: 10px;
        border-left: 5px solid var(--gold);
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    /* Tutorial Tour Overlay */
    #tour-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.7);
        display: none;
        z-index: 1000;
        justify-content: center;
        align-items: center;
    }

    .tour-box {
        background: var(--white);
        padding: 30px;
        border-radius: 15px;
        max-width: 400px;
        position: relative;
        border: 2px solid var(--gold);
        text-align: center;
    }

    .tour-arrow {
        position: absolute;
        font-size: 2rem;
        color: var(--gold);
        animation: bounce 1s infinite;
    }

    @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }

    /* WhatsApp Floating */
    .whatsapp-float {
        position: fixed;
        bottom: 30px;
        right: 30px;
        background: #25d366;
        color: white;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 30px;
        box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
        z-index: 999;
        text-decoration: none;
    }

    /* Footer */
    footer {
        margin-top: 50px;
        padding: 20px;
        text-align: center;
        border-top: 1px solid var(--gold);
        font-size: 0.9rem;
    }

    /* Central de Ajuda */
    .help-center { display: none; }
    .faq-item { margin-bottom: 10px; border: 1px solid #ddd; padding: 10px; border-radius: 5px; }

    /* Progresso Gamificado */
    .progress-container {
        background: #eee;
        border-radius: 10px;
        height: 10px;
        width: 100%;
        margin: 10px 0;
    }
    .progress-bar {
        background: var(--gold);
        height: 100%;
        border-radius: 10px;
        width: 0%;
        transition: width 0.5s;
    }
</style>
