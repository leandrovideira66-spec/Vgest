services:
  - type: web
    name: whatsapp-kiesse-bot
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PORT
        value: 3000
    buildpacks:
      - https://github.com/jontewks/puppeteer-heroku-buildpack.git
